<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no, viewport-fit=cover" />
    <meta name="theme-color" content="#0a0a0a" />
    <title>Metronome</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <main class="app">
      <div class="play-zone" id="playZone" role="button" aria-label="Start or stop the metronome" tabindex="0">
        <div class="play-zone__controls" id="playZoneControls">
          <button class="control-toggle" id="prebeatToggle" type="button"
                  aria-pressed="false" aria-label="Pre-beat count-in length: 1 or 2 bars">
            Pre-beat 1
          </button>
          <button class="control-toggle" id="subdivisionsToggle" type="button"
                  aria-pressed="false" aria-label="2× support: play a tick on every &quot;and&quot;">
            2× support
          </button>
        </div>

        <section class="beats" aria-label="Beat indicators">
          <div class="beat beat--accent" data-beat="1"></div>
          <div class="beat" data-beat="2"></div>
          <div class="beat" data-beat="3"></div>
          <div class="beat" data-beat="4"></div>
        </section>

        <section class="bar-counter" aria-label="Bar counter">
          <div class="bar-counter__inner">
            <span class="bar-counter__current" id="barCurrent">0</span>
            <span class="bar-counter__total">/ 8</span>
          </div>
        </section>
      </div>

      <section class="bpm" aria-label="BPM selection">
        <button class="bpm__pill" type="button" data-bpm="60">60</button>
        <button class="bpm__pill" type="button" data-bpm="70">70</button>
        <button class="bpm__pill" type="button" data-bpm="80">80</button>
        <button class="bpm__pill" type="button" data-bpm="90">90</button>
        <button class="bpm__pill bpm__pill--active" type="button" data-bpm="100">100</button>
        <button class="bpm__pill" type="button" data-bpm="110">110</button>
        <button class="bpm__pill" type="button" data-bpm="120">120</button>
      </section>
    </main>

    <script src="app.js"></script>
  </body>
</html>
